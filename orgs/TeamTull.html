<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D. Smith & Associates</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- ===================== BACKGROUND VIDEO ===================== -->
  <div class="video-wrapper">
    <video autoplay muted loop playsinline>
      <source src="../night-sky.mp4" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>
  </div>

  <!-- ===================== PAGE CONTENT ===================== -->
  <main class="content">

    <header class="hero">
      <h1 class="site-title">Team Tull</h1>
      <!-- <p class="site-tagline">Short description of this organization</p> -->
    </header>

    <div class="org-detail-grid">

      <!-- ===== COMPANY INFO ===== -->
      <section class="detail-section">
        <h2 class="section-heading">Company Info</h2>

        <div class="contact-card">
          <span class="contact-label">Address</span>
          <span class="contact-value">Placeholder</span>
        </div>
      </section>

      <!-- ===== GOVERNMENT IDENTIFIERS ===== -->
      <section class="detail-section">
        <h2 class="section-heading">Placeholder</h2>

        <div class="contact-card">
          <span class="contact-label">CAGE Code</span>
          <span class="contact-value">Placeholder</span>
        </div>

        <div class="contact-card">
          <span class="contact-label">UEI</span>
          <span class="contact-value">Placeholder</span>
        </div>
      </section>

      <!-- ===== CONTRACTING ===== -->
      <section class="detail-section">
        <h2 class="section-heading">Placeholder</h2>

        <div class="contact-card">
          <span class="contact-label">Socioeconomic Status</span>
          <span class="contact-value">Placeholder</span>
        </div>

        <div class="contact-card">
          <span class="contact-label">GWAC</span>
          <span class="contact-value">N/A</span>
        </div>
      </section>

      <!-- ===== POINT OF CONTACT ===== -->
      <section class="detail-section">
        <h2 class="section-heading">Point of Contact</h2>

        <div class="contact-card">
          <span class="contact-label">Name</span>
          <span class="contact-value">Placeholder</span>
        </div>

        <div class="contact-card">
          <span class="contact-label">Title</span>
          <span class="contact-value">Placeholder</span>
        </div>

        <div class="contact-card">
          <span class="contact-label">Phone</span>
          <span class="contact-value">Placeholder</span>
        </div>

        <div class="contact-card">
          <span class="contact-label">Email</span>
          <a href="mailto:Placeholder" class="contact-link">Placeholder</a>
        </div>
      </section>

      <!-- ===== MISSION STATEMENT ===== -->
      <section class="detail-section full-width">
        <h2 class="section-heading">Mission Statement</h2>

        <div class="contact-card">
          <p class="mission-text">
            Placeholder 
          </p>
        </div>
      </section>

    </div>

    <!-- Back link to main page -->
    <a href="../index.html" class="back-link">← Back</a>

  </main>

</body>

</html>
